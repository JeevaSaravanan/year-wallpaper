<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Force exact 402px wide logical viewport -->
<meta name="viewport" content="width=402, initial-scale=1.0">
<title>Year Progress Wallpaper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 402px;
    height: 874px;
    overflow: hidden;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    background: #03164a;
  }

  #wallpaper {
    width: 402px;
    height: 874px;
    position: relative;
    overflow: hidden;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(30,90,230,0.85) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 0% 100%, rgba(10,50,190,0.65) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 100% 80%, rgba(20,60,200,0.5) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(40,90,220,0.25) 0%, transparent 60%),
      linear-gradient(170deg, #062060 0%, #041850 40%, #021030 100%);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
  }
  .orb-1 { width: 260px; height: 260px; background: rgba(30,70,200,0.5);   top: -80px;  left: -80px; }
  .orb-2 { width: 160px; height: 160px; background: rgba(245,127,5,0.1);   top: 160px;  right: -40px; }
  .orb-3 { width: 300px; height: 300px; background: rgba(10,50,180,0.4);   bottom: -60px; right: -80px; }
  .orb-4 { width: 180px; height: 180px; background: rgba(50,100,230,0.28); bottom: 200px; left: -50px; }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 36px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 12px;
  }

  .year-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    color: rgba(202,204,237,0.5);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .year-number {
    font-size: 56px;
    font-weight: 700;
    color: rgba(220,228,255,0.95);
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(80,120,255,0.35);
  }

  .day-info {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin: 8px 0 18px;
  }

  .day-big {
    font-size: 16px;
    font-weight: 600;
    color: #F57F05;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px rgba(245,127,5,0.45);
  }

  .day-sub {
    font-size: 11px;
    font-weight: 400;
    color: rgba(202,204,237,0.38);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .grid-container {
    width: 100%;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    gap: 4px;
    width: 100%;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 2px; /* just slightly rounded, not circular */
  }

  .day-cell.past {
    background: #002078;
  }

  .day-cell.today {
    background: #F57F05;
    border-radius: 2px;
    box-shadow:
      0 0 6px rgba(245,127,5,0.9),
      0 0 14px rgba(245,127,5,0.5);
  }

  .day-cell.future {
    background: #CACCED;
    opacity: 0.75;
  }
</style>
</head>
<body>
<div id="wallpaper">
  <div class="bg-gradient"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <div class="content">
    <div class="day-info">
      <span class="day-big" id="dayBig">Day 69</span>
      <span class="day-sub">of 365</span>
    </div>

    <div class="grid-container">
      <div class="grid" id="dayGrid"></div>
    </div>
  </div>
</div>

<script>
  function getDayOfYear(date) {
    const start = new Date(date.getFullYear(), 0, 0);
    return Math.floor((date - start) / 86400000);
  }
  function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
  }
  function buildWallpaper() {
    const today = new Date();
    const year = today.getFullYear();
    const dayOfYear = getDayOfYear(today);
    const totalDays = isLeapYear(year) ? 366 : 365;

    document.getElementById('dayBig').textContent = `Day ${dayOfYear}`;

    const grid = document.getElementById('dayGrid');
    grid.innerHTML = '';

    for (let d = 1; d <= totalDays; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (d < dayOfYear)        cell.classList.add('past');
      else if (d === dayOfYear) cell.classList.add('today');
      else                      cell.classList.add('future');
      grid.appendChild(cell);
    }
  }
  buildWallpaper();
</script>
</body>
</html>
